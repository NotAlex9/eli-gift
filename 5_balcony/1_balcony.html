/* ── PC VIEWPORT CAMERA VIEWFINDER ── */
#scene-viewfinder {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
/* Black transition overlay */
#transition {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0; /* starts invisible, but JS overrides it instantly */
  pointer-events: none;
  z-index: 999999;
  transition: opacity 1.5s ease-in-out;
}

/* ── UNIFIED BAKED RIG ── */
#scene-camera-pan {
  position: absolute;
  width: 105vw;
  height: 105vh;
  top: -2.5vh;
  left: -2.5vw;
  transition: transform 0.2s ease-out;
  will-change: transform;
}

.layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#layer_1{z-index:1;}
#layer_2{z-index:2;}
#layer_4{z-index:3;}
#layer_5{z-index:4;}
#layer_6{z-index:5;}
#layer_7{z-index:6;}

/* ── TYPEWRITER POSITIONING ── */
.intro-text-container {
  position: absolute;
  bottom: 10%;
  left: 47%;
  transform: translateX(-50%);
  z-index: 100;
  width: 85%;
  max-width: 1400px;
  pointer-events: none;
}

.intro-typewriter-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 2.4rem;
  font-weight: bold;
  display: inline-block;
  color: #e8bbff;
  text-shadow: 0 0 8px #e8bbff99;
  line-height: 1.6;
  text-align: center;
}

.intro-typewriter-text.typing::after {
  content: '|';
  animation: blink 0.8s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── BOOK HOTSPOTS ── */
#hotspots-layer {
  position: absolute;
  inset: 0;
  z-index: 7;
  pointer-events: none;
}
.book-hotspot {
  position: absolute;
  pointer-events: auto;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 3px;
  transition: box-shadow 0.25s, background 0.25s, border-color 0.25s;
  padding: 0;
}
.book-hotspot:hover { background: rgba(255,255,255,0.04); }
.book-hotspot.hs-gold:hover   { box-shadow: 0 0 22px rgba(200,160,64,0.65), inset 0 0 14px rgba(200,160,64,0.12); }
.book-hotspot.hs-purple:hover { box-shadow: 0 0 22px rgba(124,92,191,0.65), inset 0 0 14px rgba(124,92,191,0.12); }
.book-hotspot.hs-teal:hover   { box-shadow: 0 0 22px rgba(64,192,176,0.65), inset 0 0 14px rgba(64,192,176,0.12); }
.book-hotspot.hs-rose:hover   { box-shadow: 0 0 22px rgba(192,96,128,0.65), inset 0 0 14px rgba(192,96,128,0.12); }

/* ── LIGHT HOTSPOT: hidden until revealed (20s after border is clicked) ── */
.book-hotspot.type-bulb {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
.book-hotspot.type-bulb.hs-revealed {
  opacity: 1;
  pointer-events: auto;
}

/* ── BORDER TYPE STYLING ── */
.book-hotspot.type-border {
  --border-rgb: 255,255,255;
  border: 2px dashed rgba(255,255,255,0.35);
  background: rgba(var(--border-rgb), 0.08);
  border-radius: 3px;
  box-shadow: 0 0 18px rgba(var(--border-rgb), 0.26), inset 0 0 12px rgba(var(--border-rgb), 0.08);
  animation: borderHotspotPulse 2.4s ease-in-out infinite;
}
.book-hotspot.type-border.locked {
  pointer-events: none;
  opacity: 0.3;
  filter: grayscale(0.6);
  animation: none;
  box-shadow: none;
  cursor: default;
}
.book-hotspot.type-border.unlocked {
  pointer-events: auto;
  opacity: 1;
  filter: none;
  animation: borderHotspotPulse 2.4s ease-in-out infinite;
}
.book-hotspot.type-border:hover {
  background: rgba(var(--border-rgb), 0.12);
}
.book-hotspot.type-border.is-activated {
  animation: none;
  filter: none;
  background: rgba(var(--border-rgb), 0.04);
  box-shadow: 0 0 10px rgba(var(--border-rgb), 0.16), inset 0 0 8px rgba(var(--border-rgb), 0.05);
}
.book-hotspot.type-border.hs-gold {

function startTypewriterSequence(items, callback = null) {
  const targetElement = document.getElementById('introTextElement');
  const containerElement = document.querySelector('.intro-text-container');
  if (!targetElement || !containerElement || !items || items.length === 0) return;

  let currentMsgIndex = 0;
  let currentCharIndex = 0;

  function applyItemStyle(item) {
    containerElement.style.bottom = (100 - item.yPct) + '%';
    containerElement.style.left = item.xPct + '%';
    containerElement.style.transform = item.align === 'center' ? 'translateX(-50%)' : item.align === 'right' ? 'translateX(-100%)' : 'none';
    targetElement.style.fontFamily = item.fontFamily;
    targetElement.style.fontSize = item.fontSize + 'rem';
    targetElement.style.color = item.color;
    targetElement.style.textShadow = '0 0 8px ' + item.glowColor + '99';
    targetElement.style.textAlign = item.align;
  }

  function typeCurrentLine() {
    const item = items[currentMsgIndex];
    applyItemStyle(item);
    targetElement.textContent = "";
    targetElement.classList.add('typing');
    currentCharIndex = 0;
    
    const fullText = item.text;
    
    function nextChar() {
      if (currentCharIndex < fullText.length) {
        targetElement.textContent += fullText.charAt(currentCharIndex);
        currentCharIndex++;
        setTimeout(nextChar, item.speed || 45);
      } else {
        targetElement.classList.remove('typing');
        window.addEventListener('click', advanceSequence, { once: true });
      }
    }
    nextChar();
  }

  function advanceSequence() {
    currentMsgIndex++;
    if (currentMsgIndex < items.length) {
      typeCurrentLine();
    } else {
      targetElement.textContent = "";
      if (typeof callback === 'function') callback();
    }
  }

  typeCurrentLine();
}
