/* ── PC VIEWPORT CAMERA VIEWFINDER ── */
#scene-viewfinder {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.fade-out {
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

#transition {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 999999;
  transition: opacity 1.5s ease-in-out; /* ← change this */
}

/* ── UNIFIED BAKED RIG ── */
#scene-camera-pan {
  position: absolute;
  width: 105vw;
  height: 105vh;
  top: -2.5vh;
  left: -2.5vw;
  transition: transform 0.2s ease-out;
  will-change: transform;
}

.layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#layer_1{z-index:1;}
#layer_2{z-index:2;}
#layer_3{z-index:3;}
#layer_4{z-index:4;}

/* ── TYPEWRITER POSITIONING ── */
.intro-text-container {
  position: absolute;
  bottom: 11%;
  left: 45%;
  transform: translateX(-50%);
  z-index: 100;
  width: 80%;
  max-width: 1300px;
  pointer-events: none;
}

.intro-typewriter-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 3rem;
  font-weight: bold;
  display: inline-block;
  color: #f07aec;
  text-shadow: 0 0 8px #db94f599;
  line-height: 1.6;
  text-align: center;
}

.intro-typewriter-text.typing::after {
  content: '|';
  animation: blink 0.8s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── BOOK HOTSPOTS ── */
#hotspots-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}
.book-hotspot {
  position: absolute;
  pointer-events: auto;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 3px;
  transition: box-shadow 0.25s, background 0.25s, border-color 0.25s;
  padding: 0;
}
.book-hotspot:hover { background: rgba(255,255,255,0.04); }
.book-hotspot.hs-gold:hover   { box-shadow: 0 0 22px rgba(200,160,64,0.65), inset 0 0 14px rgba(200,160,64,0.12); }
.book-hotspot.hs-purple:hover { box-shadow: 0 0 22px rgba(124,92,191,0.65), inset 0 0 14px rgba(124,92,191,0.12); }
.book-hotspot.hs-teal:hover   { box-shadow: 0 0 22px rgba(64,192,176,0.65), inset 0 0 14px rgba(64,192,176,0.12); }
.book-hotspot.hs-rose:hover   { box-shadow: 0 0 22px rgba(192,96,128,0.65), inset 0 0 14px rgba(192,96,128,0.12); }

/* ── LIGHT HOTSPOT: hidden until revealed (20s after border is clicked) ── */
.book-hotspot.type-bulb {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
.book-hotspot.type-bulb.hs-revealed {
  opacity: 1;
  pointer-events: auto;
}

/* ── BORDER TYPE STYLING ── */
.book-hotspot.type-border {
  --border-rgb: 255,255,255;
  border: 2px dashed rgba(255,255,255,0.35);
  background: rgba(var(--border-rgb), 0.08);
  border-radius: 3px;
  box-shadow: 0 0 18px rgba(var(--border-rgb), 0.26), inset 0 0 12px rgba(var(--border-rgb), 0.08);
  animation: borderHotspotPulse 2.4s ease-in-out infinite;
}
.book-hotspot.type-border.locked {
  pointer-events: none;
  opacity: 0.3;
  filter: grayscale(0.6);
  animation: none;
  box-shadow: none;
  cursor: default;
}
.book-hotspot.type-border.unlocked {
  pointer-events: auto;
  opacity: 1;
  filter: none;
  animation: borderHotspotPulse 2.4s ease-in-out infinite;
}
.book-hotspot.type-border:hover {
  background: rgba(var(--border-rgb), 0.12);
}
.book-hotspot.type-border.is-activated {
  animation: none;
  filter: none;
  background: rgba(var(--border-rgb), 0.04);
  box-shadow: 0 0 10px rgba(var(--border-rgb), 0.16), inset 0 0 8px rgba(var(--border-rgb), 0.05);
}
.book-hotspot.type-border.hs-gold {
  --border-rgb: 200,160,64;
  border-color: #c8a040;
}
.book-hotspot.type-border.hs-purple {
  --border-rgb: 124,92,191;
  border-color: #7c5cbf;
}
.book-hotspot.type-border.hs-teal {
  --border-rgb: 64,160,144;
  border-color: #40a090;
}
.book-hotspot.type-border.hs-rose {
  --border-rgb: 192,96,128;
  border-color: #c06080;
}
.book-hotspot.type-border.hs-gold:hover {
  box-shadow: 0 0 28px rgba(200,160,64,0.6), inset 0 0 16px rgba(200,160,64,0.14);
}
.book-hotspot.type-border.hs-purple:hover {
  box-shadow: 0 0 28px rgba(124,92,191,0.6), inset 0 0 16px rgba(124,92,191,0.14);
}
.book-hotspot.type-border.hs-teal:hover {
  box-shadow: 0 0 28px rgba(64,192,176,0.6), inset 0 0 16px rgba(64,192,176,0.14);
}
.book-hotspot.type-border.hs-rose:hover {
  box-shadow: 0 0 28px rgba(192,96,128,0.6), inset 0 0 16px rgba(192,96,128,0.14);
}
@keyframes borderHotspotPulse {
  0% {
    transform: translateZ(0) scale(1);
    filter: brightness(0.95);
    background: rgba(var(--border-rgb), 0.07);
    box-shadow: 0 0 16px rgba(var(--border-rgb), 0.28), inset 0 0 10px rgba(var(--border-rgb), 0.06);
  }
  50% {
    transform: translateZ(0) scale(1.02);
    filter: brightness(1.28);
    background: rgba(var(--border-rgb), 0.19);
    box-shadow: 0 0 34px rgba(var(--border-rgb), 0.82), 0 0 68px rgba(var(--border-rgb), 0.34), inset 0 0 24px rgba(var(--border-rgb), 0.22);
  }
  100% {
    transform: translateZ(0) scale(1);
    filter: brightness(0.95);
    background: rgba(var(--border-rgb), 0.07);
    box-shadow: 0 0 16px rgba(var(--border-rgb), 0.28), inset 0 0 10px rgba(var(--border-rgb), 0.06);
  }
}

.border-story-modal {
  position: fixed;
  inset: 0;
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.border-story-modal.open { opacity: 1; pointer-events: auto; }
#bg-alt {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.55s ease;
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
}
#bg-alt.open { opacity: 1; }
#bg-alt.has-image {
  background-color: transparent;
}
.border-story-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(4px);
  pointer-events: none;
}

<script>
function startTypewriterSequence(items, callback = null) {
  const targetElement = document.getElementById('introTextElement');
  const containerElement = document.querySelector('.intro-text-container');
  if (!targetElement || !containerElement || !items || items.length === 0) return;

  let currentMsgIndex = 0;
  let currentCharIndex = 0;

  function applyItemStyle(item) {
    containerElement.style.bottom = (100 - item.yPct) + '%';
    containerElement.style.left = item.xPct + '%';
    containerElement.style.transform = item.align === 'center' ? 'translateX(-50%)' : item.align === 'right' ? 'translateX(-100%)' : 'none';
    targetElement.style.fontFamily = item.fontFamily;
    targetElement.style.fontSize = item.fontSize + 'rem';
    targetElement.style.color = item.color;
    targetElement.style.textShadow = '0 0 8px ' + item.glowColor + '99';
    targetElement.style.textAlign = item.align;
  }

  function typeCurrentLine() {
    const item = items[currentMsgIndex];
    applyItemStyle(item);
    targetElement.textContent = "";
    targetElement.classList.add('typing');
    currentCharIndex = 0;
    
    const fullText = item.text;
    
    function nextChar() {
      if (currentCharIndex < fullText.length) {
        targetElement.textContent += fullText.charAt(currentCharIndex);
        currentCharIndex++;
        setTimeout(nextChar, item.speed || 45);
      } else {
        targetElement.classList.remove('typing');
        window.addEventListener('click', advanceSequence, { once: true });
      }
    }
    nextChar();
  }

  function advanceSequence() {
    currentMsgIndex++;
    if (currentMsgIndex < items.length) {
      typeCurrentLine();
    } else {
      targetElement.textContent = "";
      if (typeof callback === 'function') callback();
    }
  }

  typeCurrentLine();
}

window.addEventListener('mousemove', (e) => {
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const xOffset = (e.clientX - centerX) / centerX;
  const yOffset = (e.clientY - centerY) / centerY;
  const maxMoveRange = 20; 
  const moveX = xOffset * maxMoveRange;
  const moveY = yOffset * maxMoveRange;

  const cameraRig = document.getElementById('scene-camera-pan');
  if (cameraRig) {
    cameraRig.style.transform = `translate3d(${-moveX}px, ${-moveY}px, 0)`;
  }
});

  const BOOK_DATA = [];
  const BOOK_THEMES = {"gold":{"border":"#c8a040","borderHi":"#e0b840","bg":"rgba(200,160,64,0.04)","bgHi":"rgba(200,160,64,0.13)","bgSel":"rgba(224,184,64,0.1)","label":"#c8a040","glow":"rgba(200,160,64,0.55)","accent":"#e0b840","panel":"rgba(20,16,8,0.94)"},"purple":{"border":"#7c5cbf","borderHi":"#a07de0","bg":"rgba(124,92,191,0.04)","bgHi":"rgba(124,92,191,0.13)","bgSel":"rgba(160,125,224,0.1)","label":"#a07de0","glow":"rgba(124,92,191,0.55)","accent":"#a07de0","panel":"rgba(12,8,20,0.94)"},"teal":{"border":"#40a090","borderHi":"#60c8b0","bg":"rgba(64,192,176,0.04)","bgHi":"rgba(64,192,176,0.13)","bgSel":"rgba(96,200,176,0.1)","label":"#60c8b0","glow":"rgba(64,192,176,0.55)","accent":"#60c8b0","panel":"rgba(8,16,16,0.94)"},"rose":{"border":"#c06080","borderHi":"#e080a0","bg":"rgba(192,96,128,0.04)","bgHi":"rgba(192,96,128,0.13)","bgSel":"rgba(224,128,160,0.1)","label":"#e080a0","glow":"rgba(192,96,128,0.55)","accent":"#e080a0","panel":"rgba(16,8,12,0.94)"}};

  let bookPages = [];

  function getHotspotById(id) {
    return BOOK_DATA.find(b => b.id === id);

  function getHotspotPages(message) {
    return message && message.trim()
      ? message.split('\n---next---\n')
      : ['This page is blank.'];
  }

  function openLinkedScene(hotspot) {
    if (!hotspot || !hotspot.targetImage) return;
    const layer = document.getElementById('bg-alt');
    if (!layer) return;

    if (activeLightHotspotId === hotspot.id) {
      layer.classList.remove('open');
      activeLightHotspotId = null;
      return;
    }

    layer.style.backgroundImage = 'url("' + hotspot.targetImage.replace(/"/g, '"') + '")';
    layer.classList.add('has-image');
    layer.classList.add('open');
    activeLightHotspotId = hotspot.id;
  }

  function applyBookTheme(color) {
    const theme = BOOK_THEMES[color] || BOOK_THEMES.gold;
    const panel = document.querySelector('.book-panel');
    panel.style.setProperty('--book-accent', theme.accent);
    panel.style.setProperty('--book-glow', theme.glow);
    panel.style.background = theme.panel;
  }

  function renderBookPage() {
    document.getElementById('book-page-text').textContent = bookPages[bookPageIdx];
    document.getElementById('book-page-num').textContent = (bookPageIdx + 1) + ' / ' + bookPages.length;
    document.getElementById('book-next-btn').textContent =
      bookPageIdx < bookPages.length - 1 ? 'Next page \u2192' : 'Close book';
  }

  function openBook(id) {
    const book = getHotspotById(id);
    if (!book) return;
    applyBookTheme(book.color);
    document.querySelector('.book-title').textContent = book.title || book.name;
    bookPages = getHotspotPages(book.message);
    bookPageIdx = 0;
    renderBookPage();
    document.getElementById('book-modal').classList.add('open');
  }

  function closeBook() {
    document.getElementById('book-modal').classList.remove('open');
  }

  function clearBorderStoryTyping() {
    if (borderStoryTimeout) {

  function renderBorderStoryText(text, showCursor = false) {
    const textEl = document.getElementById('border-story-text');

      cursor.className = 'border-story-cursor';
      textEl.appendChild(cursor);
    }
  }

  function typeBorderStoryPage() {
    const fullText = borderStoryPages[borderStoryPageIdx] || '';
    const hint = document.getElementById('border-story-hint');
    borderStoryTyping = true;
    hint.classList.remove('visible');
    renderBorderStoryText('');
    borderStoryCharIdx = 0;

    function nextChar() {
      if (borderStoryCharIdx < fullText.length) {
        renderBorderStoryText(fullText.substring(0, borderStoryCharIdx + 1), true);
        borderStoryCharIdx++;
        borderStoryTimeout = setTimeout(nextChar, 55);
      } else {
        clearBorderStoryTyping();
        borderStoryTyping = false;
        renderBorderStoryText(fullText, borderStoryPageIdx < borderStoryPages.length - 1);
        hint.textContent = borderStoryPageIdx < borderStoryPages.length - 1 ? 'Click to continue' : 'Close frame';
        hint.classList.add('visible');
      }
    }

    nextChar();
  }

  function closeBorderStory() {
    clearBorderStoryTyping();
    borderStoryTyping = false;
    document.getElementById('border-story-hint').classList.remove('visible');
    document.getElementById('border-story-modal').classList.remove('open');
  }

  function openBorderStory(id) {
    const book = getHotspotById(id);
    if (!book) return;
    closeBook();
    const trigger = document.querySelector('.book-hotspot[data-id="' + id + '"]');
    if (trigger) trigger.classList.add('is-activated');
    borderStoryPages = getHotspotPages(book.message);
    borderStoryPageIdx = 0;
    document.getElementById('border-story-modal').classList.add('open');
    typeBorderStoryPage();
  }

  function nextBorderStoryPage() {
    const fullText = borderStoryPages[borderStoryPageIdx] || '';
    if (borderStoryTyping) {
      clearBorderStoryTyping();
      borderStoryTyping = false;
      renderBorderStoryText(fullText, borderStoryPageIdx < borderStoryPages.length - 1);
      const hint = document.getElementById('border-story-hint');
      hint.textContent = borderStoryPageIdx < borderStoryPages.length - 1 ? 'Click to continue' : 'Close frame';
      hint.classList.add('visible');
      return;
    }

    if (borderStoryPageIdx < borderStoryPages.length - 1) {
      borderStoryPageIdx++;
      typeBorderStoryPage();
    } else {
      closeBorderStory();
    }
  }

  function advanceBook() {
    if (bookPageIdx < bookPages.length - 1) {
      bookPageIdx++;
      renderBookPage();
    } else {
      closeBook();
    }
  }

  let lightRevealTriggered = false;
  function revealLightHotspots() {
    document.querySelectorAll('.book-hotspot.type-bulb').forEach(b => b.classList.add('hs-revealed'));
  }
  document.querySelectorAll('.book-hotspot').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const hotspot = getHotspotById(+btn.dataset.id);
      if (!hotspot) return;
      if (hotspot.type === 'bulb') {
        const overlay = document.getElementById('scene-transition-overlay');
        overlay.classList.add('active');
        setTimeout(() => { window.location.href = 'test.html'; }, 700);
        return;
      }
      if (hotspot.type === 'border') {
        openBorderStory(hotspot.id);
        if (!lightRevealTriggered) {
          lightRevealTriggered = true;
          setTimeout(revealLightHotspots, 20000);
        }
      }
      else openBook(hotspot.id);
    });
  });
  document.querySelector('.book-close').addEventListener('click', closeBook);
  document.querySelector('.book-backdrop').addEventListener('click', closeBook);
  document.getElementById('book-next-btn').addEventListener('click', advanceBook);
  document.getElementById('border-story-box').addEventListener('click', nextBorderStoryPage);
  document.querySelector('.border-story-backdrop').addEventListener('click', closeBorderStory);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeBook();
      closeBorderStory();
    }
  });
