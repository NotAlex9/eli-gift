<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotspot Editor — Cozy Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>📚 Cozy Library — Hotspot Editor</h1>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="scene-toggle">
      <button class="active" onclick="switchScene(1)">Scene 1 — Purple</button>
      <button onclick="switchScene(2)">Scene 2 — Warm</button>
    </div>
    <input type="file" id="import-file" style="display:none" accept=".html" onchange="handleImport(this)">
    <button class="btn" onclick="document.getElementById('import-file').click()">📂 Load Site.html</button>
    <button class="btn" onclick="previewSite()">👁 Preview</button>
    <button class="btn primary" onclick="exportSite()">⬇ Export site.html</button>
  </div>
</header>

<div class="main-layout">
  <div class="canvas-area">
    <div id="scene-container">
      <img id="scene-img" src="scene1.png" alt="Scene">
      <canvas id="workspace-particles"></canvas>
      <div id="draw-sel"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="editor-panel" id="editor-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
        <span style="font-size:13px;color:#c9a96e">Edit Hotspot</span>
        <button class="btn danger" style="padding:4px 10px;font-size:12px" onclick="deleteSelected()">Delete</button>
      </div>
      <div class="fg">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="Left bookshelf" oninput="upd('name',this.value)">
      </div>
      <div class="fg">
        <label>Type</label>
        <select id="f-type" onchange="upd('type',this.value)">
          <option value="book">📖 Book — opens writing</option>
          <option value="video">▶ YouTube video — opens player</option>
          <option value="bulb">💡 Light bulb — switches scene</option>
          <option value="particles">✨ Particles only — visual only</option>
          <option value="starter">⭐ Starter Box — opening sequence</option>
        </select>
      </div>

      <div class="fg">
        <label>Visible in Scene</label>
        <select id="f-hScene" onchange="upd('hScene',this.value)">
          <option value="both">🌐 Global — both scenes</option>
          <option value="1">🟣 Scene 1 only</option>
          <option value="2">🟡 Scene 2 only</option>
        </select>
      </div>
      
      <div id="book-fields-group">
        <div class="fg" id="fg-title">
          <label>Book title</label>
          <input type="text" id="f-title" placeholder="The Lost Pages" oninput="upd('title',this.value)">
        </div>
        <div class="fg" id="fg-msg">
          <label>Your writing</label>
          <textarea id="f-msg" placeholder="Write your first page here…" oninput="upd('message',this.value)"></textarea>

          <input type="file" id="img-upload" style="display:none" accept="image/*" onchange="handleImageUpload(this)">
          <button type="button" class="btn" style="margin-top:7px;width:100%" onclick="document.getElementById('img-upload').click()">🖼 Add image page</button>
          <button type="button" class="btn" style="margin-top:7px;width:100%" onclick="insertPageBreak()">Next page ↪</button>
        </div>
      </div>

      <div id="video-fields-group" style="display:none">
      <div class="fg">
        <label>Video URL (YouTube or Google Drive)</label>
        <input type="text" id="f-youtube" placeholder="https://www.youtube.com/... or Google Drive share link" oninput="updYoutube(this.value)" onchange="updYoutube(this.value)">
      </div>
      </div>

      <div id="interaction-fields-group">
        <label class="check-row">
          <input type="checkbox" id="f-fillOnRead" onchange="updChecked('fillOnRead',this.checked)">
          <span>Fill this box with glow color after it is opened</span>
        </label>
      </div>

      <div id="particle-fields-group">
        <div class="fg" id="fg-color">
          <label id="fg-color-label">Glow color</label>
          <select id="f-color" onchange="upd('color',this.value)">
            <option value="gold">Golden</option>
            <option value="purple">Purple</option>
            <option value="teal">Teal</option>
            <option value="rose">Rose</option>
          </select>
        </div>
        
        <div id="particle-fx-group" style="border:1px solid #2a2535; padding:10px; border-radius:6px; background: #0b090f; margin-top:4px">
          <span style="font-size:11px; color:#7a6a9a; text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:8px">✨ Particle FX</span>
          
          <div class="fg">
            <label>Particle Count <span class="range-val" id="v-pCount">25</span></label>
            <input type="range" id="f-pCount" min="0" max="80" value="25" oninput="updNum('pCount',this.value); document.getElementById('v-pCount').textContent=this.value">
          </div>
          
          <div class="fg">
            <label>Max Particle Size <span class="range-val" id="v-pSize">2.0</span></label>
            <input type="range" id="f-pSize" min="0.5" max="5.0" step="0.1" value="2.0" oninput="updNum('pSize',this.value); document.getElementById('v-pSize').textContent=Number(this.value).toFixed(1)">
          </div>
          
          <div class="fg">
            <label>Speed Intensity <span class="range-val" id="v-pSpeed">1.0</span></label>
            <input type="range" id="f-pSpeed" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updNum('pSpeed',this.value); document.getElementById('v-pSpeed').textContent=Number(this.value).toFixed(1)">
          </div>

          <div class="fg">
            <label>Direction</label>
            <select id="f-pDir" onchange="upd('pDir',this.value)">
              <option value="up">↑ Up</option>
              <option value="down">↓ Down</option>
              <option value="left">← Left</option>
              <option value="right">→ Right</option>
              <option value="up-left">↖ Up-Left</option>
              <option value="up-right">↗ Up-Right</option>
              <option value="down-left">↙ Down-Left</option>
              <option value="down-right">↘ Down-Right</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div style="padding:10px 13px;font-size:12px;color:#5a4a7a;border-bottom:1px solid #2a2535">
      Hotspots — <span id="hs-count">0</span>
    </div>

    <div class="hs-list" id="hs-list">
      <div class="none-msg">Drag on the image<br>to place a hotspot</div>
    </div>

    <div class="tips">
      <span class="k">Drag</span> image → draw box &nbsp;
      <span class="k">Click</span> box → edit &nbsp;
      <span class="k">⌟</span> → resize &nbsp;
      <span class="k">Del</span> → delete
    </div>

    <div class="export-section">
      <button class="btn primary" style="width:100%" onclick="exportSite()">⬇ Export site.html</button>
      <div style="font-size:11px;color:#4a3a6a;margin-top:7px;text-align:center">
        Keep site.html in the same folder as the images
      </div>
    </div>
  </div>
</div>

<!-- Instant preview modal -->
<div class="preview-modal" id="preview-modal" aria-hidden="true">
  <div class="preview-shell">
    <div class="preview-bar">
      <span class="preview-title">Preview</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" onclick="refreshPreview()">Refresh</button>
        <button class="btn danger" onclick="closePreview()">Close</button>
      </div>
    </div>
    <iframe id="preview-frame" title="Site preview" referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
