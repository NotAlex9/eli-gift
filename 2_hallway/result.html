<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Story Timeline Sequence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f14; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .scene-container { position: relative; width: 1140px; height: 500px; background: url('background.png') no-repeat center/cover; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); overflow: hidden; }
    .actor { position: absolute; transform-origin: center center; }
    .actor img { width: 100%; height: 100%; object-fit: contain; }

    .fade-out {
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    }
    #transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      opacity: 0;
      pointer-events: none;
      z-index: 999999;
      transition: opacity 1.5s ease-in-out; /* ← change this */
    }
    .element img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    }
    .speech-bubble {
      position: absolute;
      width: 340px;
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(16, 16, 28, 0.95) 0%, rgba(8, 8, 14, 0.98) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid transparent;
      border-image: linear-gradient(to bottom right, #a5a5ff, #4e4eff, rgba(15, 15, 20, 0)) 1;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(78, 78, 255, 0.15);
      opacity: 0;
      visibility: hidden;
      z-index: 50;
    }
    .speech-bubble-arrow { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 16px; height: 16px; background: #08080e; border-right: 2px solid #5757cf; border-bottom: 2px solid #5757cf; animation: bubbleFloat 2s ease-in-out infinite; }
    @keyframes bubbleFloat { 0%, 100% { transform: translateX(-50%) rotate(45deg) translate(0, 0); } 50% { transform: translateX(-50%) rotate(45deg) translate(2px, 2px); } }
    .dialogue-text { font-family: 'Georgia', serif; font-size: 1rem; font-style: italic; color: #e2e2ff; line-height: 1.5; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8); word-wrap: break-word; white-space: pre-wrap; }
  </style>
</head>

    const dialogueByScene = {"1":[{"speaker":"pusheen","text":"*growls intensely , sniffing around the dark hall*\n","x":"-18px","y":"260px","fadeIn":0.4,"hold":3,"fadeOut":0.5}],"2":[{"speaker":"ghost","text":"Get out of the way of my prey!\n","x":"371px","y":"194px","fadeIn":0.4,"hold":3,"fadeOut":0.5},{"speaker":"pusheen","text":"*looks up at her with curiosity*","x":"-9px","y":"283px","fadeIn":0.4,"hold":3,"fadeOut":0.5}],"3":[{"speaker":"colombina","text":"No one is gonna haunt you no more little kitty, shall we head to a safer place?","x":"242px","y":"175px","fadeIn":0.4,"hold":3,"fadeOut":0.5},{"speaker":"pusheen","text":"*meow meow!*","x":"-18px","y":"285px","fadeIn":0.4,"hold":3,"fadeOut":0.5}]};

    const ELEMENT_IDS = ['pusheen', 'ghost', 'colombina'];
    const sortedScenes = [...scenesData].sort((a, b) => a.scene - b.scene);

    function computeInitialBaseline() {
      const baseline = {};
      ELEMENT_IDS.forEach(id => {
        for (const s of sortedScenes) {
          const frames = s.act[id];
          if (frames && frames.length) { baseline[id] = { ...frames[0] }; break; }
        }
        if (!baseline[id]) baseline[id] = { left: "0px", top: "0px", width: "100px", height: "100px", opacity: "0" };
      });
      const firstScene = sortedScenes[0];
      ELEMENT_IDS.forEach(id => {
        const appearsFirst = firstScene.act[id] && firstScene.act[id].length > 0;
        if (!appearsFirst) baseline[id] = { ...baseline[id], opacity: "0" };
      });
      return baseline;
    }

    function buildActTimeline(act, tl, offset) {
      let actDuration = 0;
      ELEMENT_IDS.forEach(id => {
        const frames = act[id];
        if (!frames || frames.length === 0) return;
        actDuration = Math.max(actDuration, frames.length * 0.05);
        tl.set(`#${id}`, {
          left: frames[0].left, top: frames[0].top,
          width: frames[0].width, height: frames[0].height, opacity: frames[0].opacity
        }, offset);
        const gsapKeyframes = frames.map(state => ({
          left: state.left, top: state.top, width: state.width, height: state.height, opacity: state.opacity,
          duration: 0.05, ease: "none"
        }));
        tl.to(`#${id}`, { keyframes: gsapKeyframes }, offset);
      });
      return actDuration;
    }

    const initialBaseline = computeInitialBaseline();
    ELEMENT_IDS.forEach(id => gsap.set('#' + id, initialBaseline[id]));

    const bubble = document.getElementById('master-bubble');
    const textTarget = document.getElementById('dialogue-text');
    const sceneEl = document.querySelector('.scene-container');

    let typeTween = null;
    function fnTypewriter(text, textElement, duration, onDone) {
      if (typeTween) typeTween.kill();
      textElement.innerText = "";
      const textObj = { charCount: 0 };
      typeTween = gsap.to(textObj, {
        charCount: text.length, duration: duration, ease: "none",
        onUpdate: () => { textElement.innerText = text.substring(0, Math.floor(textObj.charCount)); },
        onComplete: () => { if (onDone) onDone(); }

    let currentLineText = '';
    let pendingTimers = []; // delayedCalls belonging to the current line, killed on manual skip

    function clearPendingTimers() {
      pendingTimers.forEach(t => t.kill());
      pendingTimers = [];
    }

    function playCurrentSceneAnimation() {
      phase = 'ANIMATING';
      stepCursor = -1;
      const sceneObj = sortedScenes[sceneCursor];

          pendingTimers.push(t);

      buildActTimeline(sceneObj.act, tl, 0);

    function startSceneDialogue() {
      stepCursor = 0;
      const steps = dialogueByScene[sortedScenes[sceneCursor].scene] || [];
      if (steps.length === 0) { goToNextScene(); return; }
      playLine(steps[stepCursor]);
    }

    // Plays a single dialogue line automatically: fade in -> type out -> hold
    // -> fade out on its own, then auto-advances to the next line/scene.
    // A click anywhere fast-forwards past the hold once the guard period
    // (3s from the line appearing) has passed.
    function playLine(step) {
      phase = 'LINE_GUARD';
      clearPendingTimers();
      currentLineText = step.text;

      const fadeInDur = typeof step.fadeIn === 'number' ? step.fadeIn : 0.4;
      const holdDur = typeof step.hold === 'number' ? step.hold : 3;
      const fadeOutDur = typeof step.fadeOut === 'number' ? step.fadeOut : 0.5;

      gsap.killTweensOf(bubble);
      gsap.set(bubble, { left: step.x, top: step.y });
      gsap.fromTo(bubble, { autoAlpha: 0, y: 10 }, {
        autoAlpha: 1, y: 0, duration: fadeInDur,
        onComplete: () => {
          fnTypewriter(step.text, textTarget, 2.5, () => {
            const holdTimer = gsap.delayedCall(holdDur, () => advanceLine(fadeOutDur));
            pendingTimers.push(holdTimer);

      const guardTimer = gsap.delayedCall(3, () => {
        if (phase === 'LINE_GUARD') phase = 'LINE_CLICKABLE';
      });
      pendingTimers.push(guardTimer);
    }

    function advanceLine(fadeOutDur) {
      phase = 'TRANSITION';
      clearPendingTimers();
      if (typeTween) { typeTween.kill(); textTarget.innerText = currentLineText; }
      gsap.to(bubble, { autoAlpha: 0, duration: fadeOutDur, onComplete: goToNextStepOrScene });

    function goToNextStepOrScene() {
      const steps = dialogueByScene[sortedScenes[sceneCursor].scene] || [];
      stepCursor++;
      if (stepCursor < steps.length) {
        playLine(steps[stepCursor]);
      } else {
        goToNextScene();
      }
    }

    function goToNextScene() {
      sceneCursor++;
      if (sceneCursor >= sortedScenes.length) { runOutro(); return; }
      playCurrentSceneAnimation();
    }

    function runOutro() {
      phase = 'DONE';
      clearPendingTimers();

      const outroTimeline = gsap.timeline();

      outroTimeline

          duration: 1.5,
          ease: 'power2.inOut'

          // Wait 2 seconds after the final "meow meow!" scene finishes
          setTimeout(() => {
            document.body.classList.add('fade-out');

            // Wait for the fade to complete before changing pages
            setTimeout(() => {

    // Click anywhere on the scene: only honored once a line has been showing

    sceneEl.addEventListener('click', () => {
      if (phase !== 'LINE_CLICKABLE') return;
      advanceLine(0.3);
    });

    playCurrentSceneAnimation();
